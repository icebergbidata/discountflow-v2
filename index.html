<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>DiscountFlow v2</title>
<style>
  :root {
    --red:#CC0000; --navy:#0F1B2D; --navyMid:#1C2E45;
    --slate:#2D4157; --silver:#8A9BB0; --offWhite:#F5F6F8;
    --border:#DDE3EB; --pending:#F59E0B; --approved:#10B981;
    --rejected:#EF4444; --applied:#3B82F6; --purple:#8B5CF6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--offWhite);color:var(--navy);}

  /* ── LOADER ── */
  #loader{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;}
  #loader .logo{width:56px;height:56px;background:var(--red);border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:22px;}
  #loader p{color:var(--silver);font-size:13px;}
  .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── LOGIN ── */
  #loginScreen{min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center;padding:16px;}
  .loginCard{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
  .loginLogo{width:52px;height:52px;background:var(--red);border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:22px;margin:0 auto 12px;}
  .loginTitle{text-align:center;font-weight:800;font-size:20px;color:var(--navy);}
  .loginSub{text-align:center;font-size:12px;color:var(--silver);margin-top:4px;}
  .modoBadge{text-align:center;margin:10px 0 20px;}
  .modoBadge span{background:#FEF3C7;border:1px solid #F59E0B;border-radius:6px;padding:4px 10px;font-size:11px;color:#92400E;display:inline-block;}

  /* ── FORM ELEMENTS ── */
  .formGroup{margin-bottom:14px;}
  .formGroup label{font-size:12px;font-weight:600;color:var(--slate);display:block;margin-bottom:5px;}
  .formGroup label span.req{color:var(--red);}
  .formGroup input,.formGroup select,.formGroup textarea{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border .15s;}
  .formGroup input:focus,.formGroup select:focus,.formGroup textarea:focus{border-color:var(--navy);}
  .formGroup textarea{resize:vertical;}
  .formRow{display:grid;gap:12px;}
  .formRow.cols2{grid-template-columns:1fr 1fr;}

  /* ── BUTTONS ── */
  .btn{padding:12px 20px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-primary{background:var(--red);color:#fff;}
  .btn-secondary{background:var(--offWhite);color:var(--slate);border:1px solid var(--border)!important;border:none;}
  .btn-success{background:var(--approved);color:#fff;}
  .btn-danger{background:var(--rejected);color:#fff;}
  .btn-info{background:var(--applied);color:#fff;}
  .btn-block{width:100%;}
  .btnRow{display:flex;gap:10px;}

  /* ── APP SHELL ── */
  #app{display:none;min-height:100vh;}
  .sidebar{width:220px;min-height:100vh;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;}
  .sidebarLogo{padding:20px;border-bottom:1px solid var(--navyMid);display:flex;align-items:center;gap:10px;}
  .sidebarLogoIcon{width:32px;height:32px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:14px;flex-shrink:0;}
  .sidebarLogoText{color:#fff;font-weight:800;font-size:14px;}
  .sidebarLogoSub{color:var(--silver);font-size:10px;margin-top:1px;}
  .sidebarUser{padding:14px 20px;border-bottom:1px solid var(--navyMid);}
  .sidebarUserName{color:#fff;font-weight:700;font-size:13px;}
  .sidebarUserRole{color:var(--red);font-size:11px;font-weight:600;margin-top:2px;}
  .sidebarUserSuc{color:var(--silver);font-size:11px;margin-top:2px;}
  .sidebarNav{flex:1;padding:10px 0;overflow-y:auto;}
  .navItem{width:100%;text-align:left;padding:11px 20px;background:none;border:none;border-left:3px solid transparent;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--silver);font-size:13px;font-weight:400;font-family:inherit;transition:all .15s;}
  .navItem:hover{background:var(--navyMid);color:#fff;}
  .navItem.active{background:var(--navyMid);border-left-color:var(--red);color:#fff;font-weight:700;}
  .navItem .icon{font-size:15px;flex-shrink:0;}
  .badge{background:var(--red);color:#fff;border-radius:999px;font-size:11px;font-weight:700;padding:2px 7px;margin-left:auto;min-width:20px;text-align:center;}
  .sidebarFooter{padding:14px 20px;border-top:1px solid var(--navyMid);}
  .logoutBtn{background:none;border:none;color:var(--silver);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;font-family:inherit;}

  /* ── MAIN CONTENT ── */
  .mainContent{margin-left:220px;padding:28px 32px;min-height:100vh;}
  .sectionTitle{font-size:11px;font-weight:700;color:var(--silver);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;}

  /* ── CARDS ── */
  .card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:16px;}
  .card.clickable{cursor:pointer;transition:border .15s;}
  .card.clickable:hover{border-color:var(--silver);}
  .card.selected{border:2px solid var(--navy)!important;}
  .card+.card{margin-top:10px;}

  /* ── STATUS PILLS ── */
  .pill{border-radius:999px;font-size:11px;font-weight:700;padding:3px 10px;white-space:nowrap;display:inline-block;}
  .pill-Pendiente{background:#FEF3C7;color:var(--pending);border:1px solid var(--pending);}
  .pill-Aprobado{background:#D1FAE5;color:var(--approved);border:1px solid var(--approved);}
  .pill-Negado{background:#FEE2E2;color:var(--rejected);border:1px solid var(--rejected);}
  .pill-DstoAplicado{background:#DBEAFE;color:var(--applied);border:1px solid var(--applied);}

  /* ── STAT CHIPS ── */
  .chipRow{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
  .chip{flex:1;min-width:70px;padding:12px 8px;background:#fff;border:2px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;transition:all .15s;}
  .chip .chipVal{font-size:22px;font-weight:800;line-height:1;}
  .chip .chipLbl{font-size:11px;color:var(--silver);margin-top:4px;}
  .chip.active .chipLbl{color:rgba(255,255,255,.85);font-weight:700;}

  /* ── FILTERS ── */
  .filterPanel{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px;margin-bottom:14px;}
  .filterGrid{display:grid;gap:10px;grid-template-columns:1fr 1fr;}
  .filterGroup label{font-size:11px;font-weight:600;color:var(--slate);display:block;margin-bottom:4px;}
  .filterGroup select,.filterGroup input{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;font-family:inherit;}
  .filterActions{display:flex;gap:8px;margin-top:10px;}
  .btnClear{padding:8px 14px;background:var(--offWhite);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;color:var(--slate);cursor:pointer;font-family:inherit;}

  /* ── DETAIL PANEL ── */
  .detailPanel{width:340px;flex-shrink:0;}
  .detailRow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
  .detailRow .dlabel{color:var(--silver);}
  .detailRow .dval{font-weight:600;color:var(--navy);text-align:right;max-width:55%;}
  .twoCol{display:flex;gap:20px;}
  .twoCol .listCol{flex:1;}

  /* ── STEPPER ── */
  .stepper{display:flex;align-items:center;margin-bottom:20px;}
  .stepDot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
  .stepDot.done{background:var(--approved);color:#fff;}
  .stepDot.active{background:var(--red);color:#fff;}
  .stepDot.idle{background:var(--border);color:var(--silver);}
  .stepLabel{font-size:13px;margin-left:8px;white-space:nowrap;}
  .stepLabel.active{font-weight:700;color:var(--navy);}
  .stepLabel.idle{color:var(--silver);}
  .stepLine{height:2px;flex:1;margin:0 12px;border-radius:2px;}

  /* ── ALERTS ── */
  .alertBox{border-radius:8px;padding:12px;font-size:12px;margin-bottom:12px;}
  .alertInfo{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF;}
  .alertWarn{background:#FEF3C7;border:1px solid #F59E0B;color:#92400E;}
  .alertSuccess{background:#D1FAE5;border:1px solid #10B981;color:#065F46;}
  .alertErr{background:#FEE2E2;border:1px solid #EF4444;color:#991B1B;}

  /* ── MODAL ── */
  .modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;}
  .modalBox{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .modalTitle{font-weight:800;font-size:17px;color:var(--navy);margin-bottom:4px;}
  .modalSub{font-size:13px;color:var(--silver);margin-bottom:16px;}

  /* ── PRODUCT PREVIEW ── */
  .productPreview{background:var(--offWhite);border-radius:10px;padding:14px;display:flex;gap:14px;align-items:center;margin-top:14px;}
  .productImg{width:64px;height:64px;background:var(--border);border-radius:8px;object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--silver);font-size:10px;text-align:center;}
  .productImg img{width:100%;height:100%;object-fit:cover;border-radius:8px;}

  /* ── CALC BOX ── */
  .calcGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
  .calcBox{border:2px solid var(--border);border-radius:8px;padding:11px 12px;text-align:center;}
  .calcBox .calcVal{font-size:16px;font-weight:800;color:var(--navy);}
  .calcBox .calcLbl{font-size:11px;color:var(--silver);margin-top:3px;}

  /* ── APROBADOR BADGE ── */
  .aprBadge{background:#EFF6FF;border:2px solid var(--applied);border-radius:10px;padding:14px;display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .aprAvatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .aprInfo .aprLbl{font-size:11px;font-weight:700;color:var(--silver);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
  .aprInfo .aprNom{font-size:15px;font-weight:800;color:var(--navy);}
  .aprInfo .aprSub{font-size:11px;color:var(--silver);margin-top:2px;}

  /* ── TOGGLE ── */
  .toggle{position:relative;display:inline-block;width:44px;height:24px;cursor:pointer;}
  .toggle input{opacity:0;width:0;height:0;}
  .toggleSlider{position:absolute;inset:0;background:var(--border);border-radius:12px;transition:.2s;}
  .toggleSlider:before{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  input:checked+.toggleSlider{background:var(--approved);}
  input:checked+.toggleSlider:before{left:23px;}

  /* ── MOBILE ── */
  .mobileHeader{display:none;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
  .bottomNav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:1px solid var(--navyMid);z-index:100;}
  .bottomNavInner{display:flex;}
  .bnItem{flex:1;padding:10px 4px 8px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2px solid transparent;font-family:inherit;}
  .bnItem.active{border-top-color:var(--red);}
  .bnItem .bnIcon{font-size:18px;position:relative;}
  .bnItem .bnBadge{position:absolute;top:-4px;right:-8px;background:var(--red);color:#fff;border-radius:999px;font-size:9px;font-weight:700;padding:1px 4px;min-width:14px;text-align:center;}
  .bnItem .bnLabel{font-size:10px;color:var(--silver);}
  .bnItem.active .bnLabel{color:#fff;font-weight:700;}

  @media(max-width:767px){
    .sidebar{display:none;}
    .mainContent{margin-left:0;padding:16px 16px 80px;}
    .mobileHeader{display:flex;}
    .bottomNav{display:block;}
    .twoCol{flex-direction:column;}
    .detailPanel{width:100%;}
    .formRow.cols2{grid-template-columns:1fr;}
    .filterGrid{grid-template-columns:1fr 1fr;}
    .calcGrid{grid-template-columns:1fr 1fr 1fr;}
  }
  @media(min-width:768px){
    .mobileHeader{display:none;}
    .bottomNav{display:none;}
  }

  /* ── SUCCESS SCREEN ── */
  .successScreen{text-align:center;padding:48px 20px;}
  .successIcon{font-size:56px;margin-bottom:16px;}
  .successTitle{font-weight:800;font-size:22px;color:var(--navy);margin-bottom:8px;}
  .successSub{font-size:14px;color:var(--slate);margin-bottom:6px;}
  .successRef{font-size:13px;color:var(--silver);margin-bottom:24px;}

  /* ── EMPTY STATE ── */
  .emptyState{text-align:center;padding:32px 20px;color:var(--silver);font-size:13px;}

  /* misc */
  .divider{border-top:1px dashed var(--border);margin:16px 0;}
  .blockTitle{font-weight:700;color:var(--navy);font-size:14px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--red);display:inline-block;}
  .tag{background:#EFF6FF;color:var(--applied);font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;}
  .resumen{background:var(--offWhite);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px;font-size:13px;}
  .counter{font-size:12px;color:var(--silver);margin-bottom:10px;}
  .counter strong{color:var(--navy);}
  .infoRow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .infoLeft{flex:1;min-width:0;}
  .infoRight{text-align:right;flex-shrink:0;}
  .solId{font-weight:700;font-size:12px;color:var(--navy);}
  .solSub{font-size:13px;color:var(--slate);margin:2px 0;}
  .solMeta{font-size:11px;color:var(--silver);}
  .solPrice{font-weight:800;font-size:15px;color:var(--navy);}
  .solDsto{font-size:11px;color:var(--rejected);}
  .pillRow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:4px;}
  .errMsg{color:var(--rejected);font-size:12px;margin-bottom:10px;}
  .hiddenPanel{display:none;}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="logo">DF</div>
  <div class="spinner"></div>
  <p>Cargando DiscountFlow...</p>
</div>

<!-- LOGIN -->
<div id="loginScreen" style="display:none;">
  <div class="loginCard">
    <div class="loginLogo">DF</div>
    <div class="loginTitle">DiscountFlow</div>
    <div class="loginSub">Sistema de Aprobación de Descuentos</div>
    <div class="modoBadge"><span id="modoBadgeLabel"></span></div>
    <div class="formGroup">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="Ej: ana.torres" autocomplete="username"/>
    </div>
    <div class="formGroup">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••" autocomplete="current-password"/>
    </div>
    <div id="loginErr" class="errMsg"></div>
    <button class="btn btn-primary btn-block" id="loginBtn" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- SIDEBAR (desktop) -->
  <nav class="sidebar">
    <div class="sidebarLogo">
      <div class="sidebarLogoIcon">DF</div>
      <div>
        <div class="sidebarLogoText">DiscountFlow</div>
        <div class="sidebarLogoSub" id="sidebarModo"></div>
      </div>
    </div>
    <div class="sidebarUser">
      <div class="sidebarUserName" id="sidebarNombre"></div>
      <div class="sidebarUserRole" id="sidebarRol"></div>
      <div class="sidebarUserSuc" id="sidebarSuc"></div>
    </div>
    <div class="sidebarNav" id="sidebarNav"></div>
    <div class="sidebarFooter">
      <button class="logoutBtn" onclick="logout()">🚪 Cerrar sesión</button>
    </div>
  </nav>

  <!-- MOBILE HEADER -->
  <div class="mobileHeader">
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:28px;height:28px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:12px;">DF</div>
      <div>
        <div style="font-weight:800;font-size:13px;">DiscountFlow</div>
        <div style="font-size:10px;color:var(--silver);" id="mobileModoBadge"></div>
      </div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:12px;font-weight:700;" id="mobileNombre"></div>
      <div style="font-size:10px;color:var(--red);font-weight:600;" id="mobileRol"></div>
    </div>
  </div>

  <!-- MAIN -->
  <main class="mainContent" id="mainContent"></main>

  <!-- BOTTOM NAV (mobile) -->
  <div class="bottomNav">
    <div class="bottomNavInner" id="bottomNav"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modalOverlay hiddenPanel" id="modalOverlay">
  <div class="modalBox" id="modalBox"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const BACKEND = "https://script.google.com/macros/s/AKfycbwzWd0xWc5XMniccuTVIuQ_ei5KuEqd1XgtB-hC8c72IHBXcDb1KFyTEwbE4JRQy40h3A/exec";

let CURRENT_USER = null;
let SOLICITUDES  = [];
let PRODUCTOS    = [];
let SUCURSALES   = [];
let ACTIVE_TAB   = null;

// ══════════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════════
async function api(payload) {
  const encoded = encodeURIComponent(JSON.stringify(payload));
  const url = BACKEND + "?payload=" + encoded;
  const res = await fetch(url, { method: "GET" });
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e) { return { success:false, error:"Respuesta inválida del servidor." }; }
}

// ══════════════════════════════════════════════════════════════
// ROLES
// ══════════════════════════════════════════════════════════════
const ROLES = {
  ROL001:{ label:"Vendedor",        nivel:1, aprueba:false, pctMax:0     },
  ROL002:{ label:"Administrador",   nivel:2, aprueba:true,  pctMax:2.00  },
  ROL003:{ label:"Zonal",           nivel:3, aprueba:true,  pctMax:3.00  },
  ROL004:{ label:"Jefe Retail",     nivel:4, aprueba:true,  pctMax:4.00  },
  ROL005:{ label:"Jefe Comercial",  nivel:5, aprueba:true,  pctMax:5.00  },
  ROL006:{ label:"Gerente General", nivel:6, aprueba:true,  pctMax:99    },
  ROL007:{ label:"Supervisor Caja", nivel:7, aprueba:false, pctMax:0     },
};

function rolLabel(idRol){ return (ROLES[idRol]||{}).label || idRol; }
function puedeAprobar(pct){ return CURRENT_USER && ROLES[CURRENT_USER.id_rol]?.aprueba && CURRENT_USER.pct_max_aprobacion >= pct; }

function getRolRequerido(pct){
  if(pct<=2)  return "Administrador";
  if(pct<=3)  return "Zonal";
  if(pct<=4)  return "Jefe Retail";
  if(pct<=5)  return "Jefe Comercial";
  return "Gerente General";
}

function nivelColor(pct){
  if(pct<=2) return "var(--approved)";
  if(pct<=3) return "var(--pending)";
  if(pct<=4) return "var(--purple)";
  if(pct<=5) return "var(--applied)";
  return "var(--rejected)";
}


// ── FORMATO FECHA ─────────────────────────────────────────────
function formatFecha(val) {
  if (!val) return "—";
  const d = new Date(val);
  if (isNaN(d)) return val;
  return d.toLocaleString("es-EC", { day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit" });
}
// ══════════════════════════════════════════════════════════════
// NAV CONFIG POR ROL
// ══════════════════════════════════════════════════════════════
function getNavItems(){
  const pendientes = SOLICITUDES.filter(s=>s.nombre_estado==="Pendiente"&&puedeAprobar(s.pct_descuento)).length;
  const porAplicar = SOLICITUDES.filter(s=>s.nombre_estado==="Aprobado").length;
  const rol = CURRENT_USER.id_rol;
  const base = {
    ROL001:[{id:"nueva",label:"Nueva Solicitud",icon:"＋"},{id:"mis",label:"Mis Solicitudes",icon:"📋"}],
    ROL002:[{id:"cola",label:"Por Aprobar",icon:"⏳",badge:pendientes},{id:"solicitudes",label:"Solicitudes",icon:"📊"}],
    ROL003:[{id:"cola",label:"Por Aprobar",icon:"⏳",badge:pendientes},{id:"solicitudes",label:"Solicitudes",icon:"📊"}],
    ROL004:[{id:"cola",label:"Por Aprobar",icon:"⏳",badge:pendientes},{id:"solicitudes",label:"Solicitudes",icon:"📊"}],
    ROL005:[{id:"cola",label:"Por Aprobar",icon:"⏳",badge:pendientes},{id:"solicitudes",label:"Solicitudes",icon:"📊"}],
    ROL006:[{id:"cola",label:"Por Aprobar",icon:"⏳",badge:pendientes},{id:"solicitudes",label:"Solicitudes",icon:"📊"},{id:"usuarios",label:"Usuarios",icon:"👥"}],
    ROL007:[{id:"aplicar",label:"Por Aplicar",icon:"💳",badge:porAplicar},{id:"solicitudes",label:"Solicitudes",icon:"📊"}],

  return base[rol]||[];
}

// BOOT
// ══════════════════════════════════════════════════════════════
window.onload = async function(){
  // Check sesión guardada
  const saved = sessionStorage.getItem("df_user");
  if(saved){
    CURRENT_USER = JSON.parse(saved);
    await loadData();
    showApp();
  } else {
    showLogin();
  }
};

function showLogin(){
  document.getElementById("loader").style.display="none";
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("app").style.display="none";
  const modo = true; // se actualiza con respuesta del backend
  document.getElementById("modoBadgeLabel").textContent = "🧪 Ambiente de Pruebas";
}

async function doLogin(){
  const btn  = document.getElementById("loginBtn");
  const user = document.getElementById("loginUser").value.trim();
  const pass = document.getElementById("loginPass").value;
  const err  = document.getElementById("loginErr");
  err.textContent="";
  if(!user||!pass){ err.textContent="Completa todos los campos."; return; }
  btn.disabled=true; btn.textContent="Ingresando...";
  try{
    const res = await api({ accion:"LOGIN", username:user, password:pass });
    if(!res.success){ err.textContent=res.error; return; }
    CURRENT_USER = res.data.user;
    sessionStorage.setItem("df_user", JSON.stringify(CURRENT_USER));
    await loadData();
    showApp();
  } catch(e){
    err.textContent="Error de conexión. Intenta de nuevo.";
  } finally {
    btn.disabled=false; btn.textContent="Ingresar";
  }
}

async function loadData(){
  const [solRes, prdRes, sucRes] = await Promise.all([
    api({ accion:"GET_SOLICITUDES", user:CURRENT_USER }),
    api({ accion:"GET_PRODUCTOS" }),
    api({ accion:"GET_SUCURSALES" }),
  ]);
  if(solRes.success) SOLICITUDES = solRes.data;
  if(prdRes.success) PRODUCTOS   = prdRes.data;
  if(sucRes.success) SUCURSALES  = sucRes.data;
}

function showApp(){
  document.getElementById("loader").style.display="none";
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="block";

  // Sidebar info
  document.getElementById("sidebarNombre").textContent = CURRENT_USER.nombre_completo;
  document.getElementById("sidebarRol").textContent    = CURRENT_USER.nombre_rol;
  document.getElementById("sidebarSuc").textContent    = CURRENT_USER.id_sucursal||"";
  document.getElementById("sidebarModo").textContent   = "v2 · Modo Pruebas 🧪";
  document.getElementById("mobileNombre").textContent  = CURRENT_USER.nombre_completo;
  document.getElementById("mobileRol").textContent     = CURRENT_USER.nombre_rol;
  document.getElementById("mobileModoBadge").textContent = "🧪 Modo Pruebas";

  renderNav();

  // Default tab
  const defaults = {ROL001:"nueva",ROL002:"cola",ROL003:"cola",ROL004:"cola",ROL005:"cola",ROL006:"cola",ROL007:"aplicar"};
  navigate(defaults[CURRENT_USER.id_rol]||"historial");
}

function logout(){
  sessionStorage.removeItem("df_user");
  CURRENT_USER=null; SOLICITUDES=[]; PRODUCTOS=[]; SUCURSALES=[];
  document.getElementById("app").style.display="none";
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("loginUser").value="";
  document.getElementById("loginPass").value="";
}

function renderNav(){
  const items = getNavItems();
  // Sidebar
  document.getElementById("sidebarNav").innerHTML = items.map(it=>`
    <button class="navItem ${ACTIVE_TAB===it.id?'active':''}" onclick="navigate('${it.id}')">
      <span class="icon">${it.icon}</span>${it.label}
      ${it.badge?`<span class="badge">${it.badge}</span>`:""}
    </button>`).join("");
  // Bottom nav
  document.getElementById("bottomNav").innerHTML = [...items,{id:"__logout",label:"Salir",icon:"🚪"}].map(it=>`
    <button class="bnItem ${ACTIVE_TAB===it.id?'active':''}" onclick="${it.id==='__logout'?'logout()':("navigate('"+it.id+"')")}">
      <span class="bnIcon">${it.icon}${it.badge?`<span class="bnBadge">${it.badge}</span>`:""}</span>
      <span class="bnLabel">${it.label}</span>
    </button>`).join("");
}

async function navigate(tab){
  ACTIVE_TAB = tab;
  renderNav();
  const mc = document.getElementById("mainContent");
  mc.innerHTML = `<div style="text-align:center;padding:40px;color:var(--silver);">Cargando...</div>`;
  switch(tab){
    case "nueva":        renderNuevaSolicitud(); break;
    case "mis":          renderMisSolicitudes(); break;
    case "cola":         renderCola(); break;
    case "solicitudes":  renderSolicitudes(); break;
    case "seguimiento":  renderSolicitudes(); break;
    case "historial":    renderSolicitudes(); break;
    case "aplicar":      renderAplicar(); break;
    case "usuarios":     await renderUsuarios(); break;
  }
}

function chipRow(counts, active, onclick){
  const chips = [
    {key:"Todos",  label:"Total",      val:counts.total,    color:"var(--navy)"},

    {key:"Negado",   label:"Negadas",   val:counts.negado,   color:"var(--rejected)"},
    {key:"Dsto Aplicado",label:"Dsto. Aplic.",val:counts.aplicado,color:"var(--applied)"},
  ];
  return `<div class="chipRow">${chips.map(c=>{
    const isActive = active===c.key;
    return `<div class="chip ${isActive?'active':''}"
      style="${isActive?`background:${c.color};border-color:${c.color};`:`border-color:var(--border);`}"
      onclick="${onclick}('${c.key}')">
      <div class="chipVal" style="color:${isActive?'#fff':c.color}">${c.val}</div>
      <div class="chipLbl">${c.label}</div>
    </div>`;
  }).join("")}</div>`;
}

let nuevaStep = 1;

  nuevaStep = step; nuevaData = data;

    <div class="stepDot ${step===2?'active':'idle'}">2</div>
    <span class="stepLabel ${step===2?'active':'idle'}">Descuento & Envío</span>
  </div>`;

          <input id="n_cedula" value="${data.cedula_ruc_cliente||''}" placeholder="0102345678"/></div>
        <div class="formGroup" style="grid-column:1/-1"><label>N° Oportunidad ERP <span class="req">*</span></label>

      <span class="blockTitle">Modelo & Cantidad</span>
      <div class="formRow cols2" style="margin-top:12px;">
        <div class="formGroup"><label>Categoría <span class="req">*</span></label>
          <select id="n_cat" onchange="onCatChange()">
            <option value="">Seleccionar...</option>
            ${categorias.map(c=>`<option ${data.categoria===c?'selected':''}>${c}</option>`).join("")}
          </select></div>
        <div class="formGroup"><label>Modelo <span class="req">*</span></label>
          <select id="n_modelo" onchange="onModeloChange()">
            <option value="">Seleccionar...</option>

          </select></div>
        <div class="formGroup"><label>Cantidad <span class="req">*</span></label>
          <input id="n_qty" type="number" min="1" value="${data.cantidad_unidades||1}"/></div>
      </div>
      <div id="productPreview">${data.modelo?productPreviewHTML(data):'<div class="productPreview"><div class="productImg">Selecciona modelo</div></div>'}</div>
      <div class="errMsg" id="errStep1"></div>
      <div class="btnRow" style="margin-top:16px;">
        <button class="btn btn-primary" onclick="goStep2()">Siguiente → Descuento</button>
      </div>
    </div>`;
  } else {
    mc.innerHTML = `
    <div class="sectionTitle">Nueva Solicitud de Descuento</div>
    ${stepper}
    <div class="card">
      <div class="resumen">
        <span><span style="color:var(--silver)">Producto: </span><strong>${data.modelo} — ${data.categoria}</strong>
        <span style="color:var(--silver);margin-left:12px">Cant: </span><strong>${data.cantidad_unidades} ud.</strong></span>
        <span style="color:var(--silver)">P. Oficial: <strong style="color:var(--navy)">$${parseFloat(data.precio_oficial).toFixed(2)}</strong></span>

        </div>

function productPreviewHTML(data){
  return `<div class="productPreview">
    <div class="productImg">${data.url_imagen?`<img src="${data.url_imagen}" alt="${data.modelo}"/>`:'IMG'}</div>
    <div><div style="font-weight:700;font-size:14px;">${data.modelo} — ${data.categoria}</div>
    <div style="font-size:13px;color:var(--silver);margin-top:2px;">Precio oficial: <strong style="color:var(--navy)">$${parseFloat(data.precio_oficial||0).toFixed(2)}</strong></div></div>
  </div>`;
}

function onCatChange(){
  const cat = document.getElementById("n_cat").value;
  const sel = document.getElementById("n_modelo");
  const prds = PRODUCTOS.filter(p=>p.categoria===cat);
  sel.innerHTML = `<option value="">Seleccionar...</option>${prds.map(p=>`<option value="${p.id_producto}">${p.modelo}</option>`).join("")}`;
  document.getElementById("productPreview").innerHTML = `<div class="productPreview"><div class="productImg">Selecciona modelo</div></div>`;
}

function onModeloChange(){
  const id = document.getElementById("n_modelo").value;
  const prd = PRODUCTOS.find(p=>p.id_producto===id);
  if(!prd) return;
  nuevaData.id_producto   = prd.id_producto;
  nuevaData.modelo        = prd.modelo;
  nuevaData.categoria     = prd.categoria;
  nuevaData.precio_oficial= prd.precio_oficial;
  nuevaData.url_imagen    = prd.url_imagen;
  document.getElementById("productPreview").innerHTML = productPreviewHTML(prd);
}

function goStep2(){
  const cliente = document.getElementById("n_cliente").value.trim();
  const cedula  = document.getElementById("n_cedula").value.trim();
  const oport   = document.getElementById("n_oport").value.trim();
  const cat     = document.getElementById("n_cat").value;
  const modelo  = document.getElementById("n_modelo").value;
  const qty     = parseInt(document.getElementById("n_qty").value)||1;
  if(!cliente||!cedula||!oport||!cat||!modelo){
    document.getElementById("errStep1").textContent="Completa todos los campos obligatorios."; return;
  }
  nuevaData = {...nuevaData, nombre_cliente:cliente, cedula_ruc_cliente:cedula, nro_oportunidad:oport, categoria:cat, cantidad_unidades:qty };
  renderNuevaSolicitud(2, nuevaData);
}

function onPctChange(){
  const pct  = parseFloat(document.getElementById("n_pct")?.value)||0;
  const precio = parseFloat(nuevaData.precio_oficial)||0;
  const qty    = parseInt(nuevaData.cantidad_unidades)||1;
  const final  = precio*(1-pct/100);
  const dsto   = (precio-final)*qty;
  const color  = nivelColor(pct);

  if(pct>0){
    document.getElementById("n_pct").style.borderColor = color;
    document.getElementById("valFinal").textContent = "$"+final.toFixed(2);
    document.getElementById("boxFinal").style.borderColor = "var(--approved)";
    document.getElementById("valDsto").textContent = "−$"+dsto.toFixed(2);
    document.getElementById("boxDsto").style.borderColor = "var(--rejected)";
    const rol = getRolRequerido(pct);
    document.getElementById("aprBadgeDiv").innerHTML = `
      <div class="aprBadge" style="border-color:${color};">
        <div class="aprAvatar" style="background:${color};">👤</div>
        <div class="aprInfo">
          <div class="aprLbl">Requiere aprobación de</div>
          <div class="aprNom">${rol}</div>
          <div class="aprSub">Todos los niveles superiores recibirán copia informativa.</div>
        </div>
      </div>`;
    nuevaData.pct_descuento = pct;
  } else {
    document.getElementById("aprBadgeDiv").innerHTML="";
  }
}

async function submitSolicitud(){
  const pct    = parseFloat(document.getElementById("n_pct").value)||0;
  const motivo = document.getElementById("n_motivo").value.trim();
  if(pct<=0){ document.getElementById("errStep2").textContent="Ingresa un % de descuento válido."; return; }
  if(!motivo){ document.getElementById("errStep2").textContent="El motivo es obligatorio."; return; }
  nuevaData.pct_descuento       = pct;
  nuevaData.observacion_vendedor= motivo;

  const btn = document.querySelector("#mainContent .btn-success");
  btn.disabled=true; btn.textContent="Enviando...";

  const res = await api({ accion:"CREAR_SOLICITUD", user:CURRENT_USER, datos:nuevaData });
  if(!res.success){
    document.getElementById("errStep2").textContent = res.error;
    btn.disabled=false; btn.textContent="✓ Enviar Solicitud"; return;
  }

  await loadData(); renderNav();
  document.getElementById("mainContent").innerHTML = `
  <div class="successScreen">
    <div class="successIcon">✅</div>
    <div class="successTitle">Solicitud enviada</div>
    <div class="successSub">Referencia: <strong>${res.data.id_solicitud}</strong></div>
    <div class="successRef">Notificado a: <strong>${res.data.aprobador}</strong> y niveles superiores.</div>
    <button class="btn btn-primary" onclick="renderNuevaSolicitud(1,{})">+ Nueva Solicitud</button>
  </div>`;
}

let misFiltro="Todos", misSelected=null;

function renderMisSolicitudes(){
  const base = SOLICITUDES.filter(s=>s.id_vendedor===CURRENT_USER.id_usuario);
  const counts = {
    total:base.length,
    pendiente:base.filter(s=>s.nombre_estado==="Pendiente").length,
    aprobado:base.filter(s=>s.nombre_estado==="Aprobado").length,
    negado:base.filter(s=>s.nombre_estado==="Negado").length,
    aplicado:base.filter(s=>s.nombre_estado==="Dsto Aplicado").length,
  };
  const lista = base.filter(s=>misFiltro==="Todos"||s.nombre_estado===misFiltro);

  document.getElementById("mainContent").innerHTML = `
  <div class="sectionTitle">Mis Solicitudes</div>
  ${chipRow(counts, misFiltro, "setMisFiltro")}
  <div class="counter">Mostrando <strong>${lista.length}</strong> de ${base.length} solicitudes</div>
  <div class="twoCol">
    <div class="listCol" id="misList">
      ${lista.length===0
        ? '<div class="emptyState">No hay solicitudes que coincidan.</div>'
        : lista.map(s=>`
          <div class="card clickable ${misSelected===s.id_solicitud?'selected':''}" style="margin-bottom:10px;" onclick="selectMis('${s.id_solicitud}')">
            <div class="infoRow">
              <div class="infoLeft">
                <div class="pillRow"><span class="solId">${s.id_solicitud}</span>${pill(s.nombre_estado)}<span class="tag" style="color:${nivelColor(s.pct_descuento)}">${s.pct_descuento}%</span></div>
                <div class="solSub">${s.nombre_cliente} · ${s.modelo}</div>
                <div class="solMeta">${formatFecha(s.fecha_solicitud)} · Aprobador: ${s.nombre_aprobador_requerido}</div>
                ${s.nombre_aprobador_real?`<div class="solMeta" style="color:var(--approved)">✓ ${s.nombre_aprobador_real} (${s.rol_aprobador_real})</div>`:""}
              </div>
              <div class="infoRight">
                <div class="solPrice">$${parseFloat(s.precio_final).toFixed(2)}</div>
                <div class="solDsto">−$${(parseFloat(s.precio_oficial)-parseFloat(s.precio_final)).toFixed(2)}</div>
              </div>
            </div>
          </div>`).join("")}
    </div>
    <div id="misDetail"></div>
  </div>`;
}

function setMisFiltro(key){
  if(misFiltro===key && key!=="Todos"){ misFiltro="Todos"; }
  else { misFiltro=key; }
  misSelected=null;
  renderMisSolicitudes();
}
function applyFilter_mis(){ renderMisSolicitudes(); }
function clearFilter_mis(){ misFiltro="Todos"; renderMisSolicitudes(); }

function selectMis(idSol){
  misSelected=idSol;
  const s=SOLICITUDES.find(x=>x.id_solicitud===idSol);
  document.getElementById("misDetail").innerHTML=detailPanel(s);
  document.querySelectorAll("#misList .card").forEach(c=>{
    c.classList.toggle("selected", c.getAttribute("onclick")===`selectMis('${idSol}')`);
  });
}

// ══════════════════════════════════════════════════════════════
// SOLICITUDES — Vista unificada (ex Seguimiento + Historial)
// ══════════════════════════════════════════════════════════════
let solFiltro="Todos", solSelected=null;

function renderSolicitudes(){
  const base = SOLICITUDES;
  const miNivel = ROLES[CURRENT_USER.id_rol]?.nivel||0;
  const esAprobador = ROLES[CURRENT_USER.id_rol]?.aprueba||false;

  const counts = {
    total:base.length,
    pendiente:base.filter(s=>s.nombre_estado==="Pendiente").length,
    aprobado:base.filter(s=>s.nombre_estado==="Aprobado").length,
    negado:base.filter(s=>s.nombre_estado==="Negado").length,
    aplicado:base.filter(s=>s.nombre_estado==="Dsto Aplicado").length,
  };
  // Apply all active filters
  const lista = base.filter(s=>{
    if(solFiltro!=="Todos" && s.nombre_estado!==solFiltro) return false;
    if(window._solSuc && s.id_sucursal !== window._solSuc) return false;
    if(window._solDesde){
      const fechaSol = new Date(s.fecha_solicitud);
      const desde    = new Date(window._solDesde);
      if(fechaSol < desde) return false;
    }
    if(window._solHasta){
      const fechaSol = new Date(s.fecha_solicitud);
      const hasta    = new Date(window._solHasta);
      hasta.setHours(23,59,59);
      if(fechaSol > hasta) return false;
    }
    return true;
  });

  document.getElementById("mainContent").innerHTML = `
  <div class="sectionTitle">Solicitudes</div>
  ${chipRow(counts, solFiltro, "setSolFiltro")}
  <div class="filterPanel">
    <div class="filterGrid">
      <div class="filterGroup"><label>Sucursal</label>
        <select id="fs_suc_sol" onchange="applySolFilter()">
          <option value="">Todas</option>
          ${SUCURSALES.map(s=>`<option>${s.nombre}</option>`).join("")}
        </select>
      </div>
      <div class="filterGroup"><label>Desde</label><input type="date" id="fs_desde_sol" onchange="applySolFilter()"/></div>
      <div class="filterGroup"><label>Hasta</label><input type="date" id="fs_hasta_sol" onchange="applySolFilter()"/></div>
      <div class="filterGroup"><label>Estado</label>
        <select id="fs_est_sol" onchange="applySolFilter()">
          <option value="Todos">Todos</option>
          <option>Pendiente</option><option>Aprobado</option>
          <option>Negado</option><option>Dsto Aplicado</option>
        </select>
      </div>
    </div>
    <div class="filterActions"><button class="btnClear" onclick="clearSolFilter()">✕ Limpiar</button></div>
  </div>
  <div class="counter">Mostrando <strong>${lista.length}</strong> de ${base.length} solicitudes</div>
  <div class="twoCol">
    <div class="listCol" id="solList">
      ${lista.length===0
        ? '<div class="emptyState">Sin resultados para este filtro.</div>'
        : lista.map(s=>{
            const puedo = puedeAprobar(s.pct_descuento);
            const pendInfo = s.nombre_estado==="Pendiente"
              ? (puedo && esAprobador
                  ? `<div class="solMeta" style="color:var(--approved);margin-top:3px;">✓ Puedes aprobar desde "Por Aprobar".</div>`
                  : `<div style="font-size:11px;margin-top:4px;background:#FEF3C7;border:1px solid #F59E0B;border-radius:6px;padding:4px 8px;color:#92400E;display:inline-block;">⏳ Esperando: <strong>${s.rol_aprobador_requerido}</strong></div>`)
              : "";
            return `<div class="card clickable ${solSelected===s.id_solicitud?'selected':''}" style="margin-bottom:10px;" onclick="selectSol('${s.id_solicitud}')">
              <div class="infoRow">
                <div class="infoLeft">
                  <div class="pillRow"><span class="solId">${s.id_solicitud}</span>${pill(s.nombre_estado)}<span class="tag" style="color:${nivelColor(s.pct_descuento)}">${s.pct_descuento}%</span></div>
                  <div class="solSub">${s.nombre_cliente} · ${s.modelo} · ${(SUCURSALES.find(x=>x.id_sucursal===s.id_sucursal)||{}).nombre||s.id_sucursal}</div>
                  <div class="solMeta">${(SUCURSALES.find(x=>x.id_sucursal===s.id_sucursal)||{}).nombre||s.id_sucursal} · ${s.nombre_vendedor} · ${formatFecha(s.fecha_solicitud)}</div>
                  ${s.nombre_aprobador_real?`<div class="solMeta" style="color:var(--approved)">✓ ${s.nombre_aprobador_real} (${s.rol_aprobador_real})</div>`:""}
                  ${pendInfo}
                </div>
                <div class="infoRight">
                  <div class="solPrice">$${parseFloat(s.precio_final).toFixed(2)}</div>
                  <div class="solDsto">−$${(parseFloat(s.precio_oficial)-parseFloat(s.precio_final)).toFixed(2)}</div>
                </div>
              </div>
            </div>`;
          }).join("")}
    </div>
    <div id="solDetail"></div>
  </div>`;

  if(solFiltro!=="Todos"){ const e=document.getElementById("fs_est_sol"); if(e) e.value=solFiltro; }
}

function setSolFiltro(key){
  if(solFiltro===key && key!=="Todos"){ solFiltro="Todos"; }
  else { solFiltro=key; }
  solSelected=null;
  renderSolicitudes();
  requestAnimationFrame(()=>{
    const e=document.getElementById("fs_est_sol"); if(e) e.value=solFiltro;
    const sd=document.getElementById("fs_desde_sol"); if(sd) sd.value=window._solDesde||"";
    const sh=document.getElementById("fs_hasta_sol"); if(sh) sh.value=window._solHasta||"";
    const ss=document.getElementById("fs_suc_sol"); if(ss&&window._solSuc){ const sn=SUCURSALES.find(x=>x.id_sucursal===window._solSuc); if(sn) ss.value=sn.nombre; }
  });
}
function applySolFilter(){
  const eEst  = document.getElementById("fs_est_sol");
  const eSuc  = document.getElementById("fs_suc_sol");
  const eDesde= document.getElementById("fs_desde_sol");
  const eHasta= document.getElementById("fs_hasta_sol");
  if(eEst)   solFiltro        = eEst.value||"Todos";
  if(eSuc){
    const sucNombre = eSuc.value;
    if(sucNombre && sucNombre!=="Todas"){
      const suc = SUCURSALES.find(x=>x.nombre===sucNombre);
      window._solSuc = suc ? suc.id_sucursal : "";
    } else { window._solSuc = ""; }
  }
  window._solDesde = eDesde ? eDesde.value : "";
  window._solHasta = eHasta ? eHasta.value : "";
  renderSolicitudes();
  // Restore select values after re-render
  requestAnimationFrame(()=>{
    const es=document.getElementById("fs_est_sol"); if(es) es.value=solFiltro;
    const ss=document.getElementById("fs_suc_sol"); if(ss&&window._solSuc){ const sn=SUCURSALES.find(x=>x.id_sucursal===window._solSuc); if(sn) ss.value=sn.nombre; }
    const sd=document.getElementById("fs_desde_sol"); if(sd) sd.value=window._solDesde||"";
    const sh=document.getElementById("fs_hasta_sol"); if(sh) sh.value=window._solHasta||"";
  });
}
function clearSolFilter(){
  solFiltro="Todos"; window._solSuc=""; window._solDesde=""; window._solHasta="";
  renderSolicitudes();
}

function selectSol(idSol){
  solSelected=idSol;
  const s=SOLICITUDES.find(x=>x.id_solicitud===idSol);
  document.getElementById("solDetail").innerHTML=detailPanel(s);
  document.querySelectorAll("#solList .card").forEach(card=>{
    card.classList.toggle("selected", card.getAttribute("onclick")===`selectSol('${idSol}')`);
  });
}

// ══════════════════════════════════════════════════════════════
// COLA DE APROBACIÓN
// ══════════════════════════════════════════════════════════════
let colaSelected = null;

function renderCola(){
  const cola = SOLICITUDES.filter(s=>s.nombre_estado==="Pendiente"&&puedeAprobar(s.pct_descuento));
  colaSelected = null;
  const mc = document.getElementById("mainContent");
  mc.innerHTML = `
  <div class="sectionTitle">Por Aprobar — ${CURRENT_USER.nombre_rol} (${cola.length})</div>
  ${cola.length===0
    ? `<div class="emptyState">✅ No tienes solicitudes pendientes por aprobar.</div>`
    : `<div class="twoCol">
        <div class="listCol" id="colaList">
          ${cola.map(s=>solCard(s,`selectCola('${s.id_solicitud}')`)).join("")}
        </div>
        <div id="colaDetail"></div>
      </div>`}`;
}

function selectCola(idSol){
  colaSelected = SOLICITUDES.find(s=>s.id_solicitud===idSol);
  // Re-render list with selected
  const cola = SOLICITUDES.filter(s=>s.nombre_estado==="Pendiente"&&puedeAprobar(s.pct_descuento));
  document.getElementById("colaList").innerHTML = cola.map(s=>solCard(s,`selectCola('${s.id_solicitud}')`,s.id_solicitud===idSol)).join("");

  const esOtroNivel = colaSelected.rol_aprobador_requerido !== CURRENT_USER.nombre_rol;
  const extra = `
    ${esOtroNivel?`<div class="alertInfo" style="margin-top:10px;">ℹ️ Aprobando como <strong>${CURRENT_USER.nombre_rol}</strong> en nombre del nivel requerido: <strong>${colaSelected.rol_aprobador_requerido}</strong>. Tu nombre y rol quedarán registrados.</div>`:""}
    <div class="btnRow" style="margin-top:14px;">
      <button class="btn btn-success" style="flex:1" onclick="openModal('Aprobar','${idSol}')">✓ Aprobar</button>
      <button class="btn btn-danger"  style="flex:1" onclick="openModal('Rechazar','${idSol}')">✗ Rechazar</button>
    </div>`;
  document.getElementById("colaDetail").innerHTML = detailPanel(colaSelected, extra);
}

// ══════════════════════════════════════════════════════════════
// MODAL APROBACIÓN
// ══════════════════════════════════════════════════════════════
function openModal(accion, idSol){
  const s = SOLICITUDES.find(x=>x.id_solicitud===idSol);
  const isAprobar = accion==="Aprobar";
  const color = isAprobar?"var(--approved)":"var(--rejected)";
  document.getElementById("modalBox").innerHTML = `
    <div class="modalTitle">${isAprobar?"✓ Confirmar Aprobación":"✗ Confirmar Rechazo"}</div>
    <div class="modalSub">${s.id_solicitud} · ${s.nombre_cliente} · ${s.pct_descuento}%</div>
    <div class="alertInfo" style="margin-bottom:14px;">
      Aprobado por: <strong>${CURRENT_USER.nombre_completo}</strong> — ${CURRENT_USER.nombre_rol}
    </div>
    <div class="formGroup">
      <label>Observación ${isAprobar?"(opcional)":"*"}</label>
      <textarea id="modalObs" rows="3" placeholder="${isAprobar?'Observación del aprobador...':'Indica el motivo del rechazo...'}"></textarea>
    </div>
    <div class="errMsg" id="modalErr"></div>
    <div class="btnRow">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn" style="flex:1;background:${color};color:#fff;" onclick="confirmarResolucion('${accion}','${idSol}')">
        ${isAprobar?"✓ Aprobar":"✗ Rechazar"}
      </button>
    </div>`;
  document.getElementById("modalOverlay").classList.remove("hiddenPanel");
}

function closeModal(){
  document.getElementById("modalOverlay").classList.add("hiddenPanel");
}

async function confirmarResolucion(accion, idSol){
  const obs = document.getElementById("modalObs").value.trim();
  if(accion==="Rechazar"&&!obs){ document.getElementById("modalErr").textContent="La observación es obligatoria al rechazar."; return; }
  const decision = accion==="Aprobar"?"Aprobado":"Negado";
  const btn = document.querySelector("#modalBox .btn:last-child");
  btn.disabled=true; btn.textContent="Procesando...";

  const res = await api({ accion:"RESOLVER_SOLICITUD", user:CURRENT_USER, id_solicitud:idSol, decision, observacion:obs });
  if(!res.success){ document.getElementById("modalErr").textContent=res.error; btn.disabled=false; btn.textContent=accion; return; }

  closeModal();
  await loadData(); renderNav();
  renderCola();
}

// POR APLICAR
// ══════════════════════════════════════════════════════════════
let aplicarSelected=null;

function renderAplicar(){
  const cola = SOLICITUDES.filter(s=>s.nombre_estado==="Aprobado");
  aplicarSelected=null;
  document.getElementById("mainContent").innerHTML = `
  <div class="sectionTitle">Por Aplicar en ERP (${cola.length})</div>
  ${cola.length===0
    ? `<div class="emptyState">✅ No hay descuentos pendientes de aplicar.</div>`
    : `<div class="twoCol">
        <div class="listCol" id="aplicarList">
          ${cola.map(s=>`
          <div class="card clickable ${aplicarSelected===s.id_solicitud?'selected':''}" style="margin-bottom:10px;" onclick="selectAplicar('${s.id_solicitud}')">
            <div class="infoRow">
              <div class="infoLeft">
                <div class="pillRow"><span class="solId">${s.id_solicitud}</span>${pill(s.nombre_estado)}</div>
                <div class="solSub">${s.nombre_cliente} · ${s.cedula_ruc_cliente}</div>
                <div style="font-size:12px;color:var(--applied);font-weight:700;">N° Oportunidad: ${s.nro_oportunidad}</div>
                <div class="solMeta">${(SUCURSALES.find(x=>x.id_sucursal===s.id_sucursal)||{}).nombre||s.id_sucursal} · ${s.modelo} · ${s.pct_descuento}%</div>
                <div class="solMeta" style="color:var(--approved)">Aprobado por: ${s.nombre_aprobador_real} (${s.rol_aprobador_real})</div>
              </div>
              <div class="infoRight">
                <div class="solPrice">$${parseFloat(s.precio_final).toFixed(2)}</div>
                <div style="font-size:11px;color:var(--approved)">Aprobado ✓</div>
              </div>
            </div>
          </div>`).join("")}
        </div>
        <div id="aplicarDetail"></div>
      </div>`}`;
}

function selectAplicar(idSol){
  aplicarSelected=idSol;
  const s=SOLICITUDES.find(x=>x.id_solicitud===idSol);
  const cola=SOLICITUDES.filter(x=>x.nombre_estado==="Aprobado");
  document.getElementById("aplicarList").innerHTML=cola.map(x=>`
    <div class="card clickable ${x.id_solicitud===idSol?'selected':''}" style="margin-bottom:10px;" onclick="selectAplicar('${x.id_solicitud}')">
      <div class="infoRow">
        <div class="infoLeft">
          <div class="pillRow"><span class="solId">${x.id_solicitud}</span>${pill(x.nombre_estado)}</div>
          <div class="solSub">${x.nombre_cliente} · ${x.cedula_ruc_cliente}</div>
          <div style="font-size:12px;color:var(--applied);font-weight:700;">N° Oportunidad: ${x.nro_oportunidad}</div>
          <div class="solMeta">${(SUCURSALES.find(s=>s.id_sucursal===x.id_sucursal)||{}).nombre||x.id_sucursal} · ${x.modelo} · ${x.pct_descuento}%</div>
        </div>
        <div class="infoRight"><div class="solPrice">$${parseFloat(x.precio_final).toFixed(2)}</div></div>
      </div>
    </div>`).join("");

  const extra=`
    <div class="alertSuccess" style="margin-top:12px;">✓ Aprobado por <strong>${s.nombre_aprobador_real}</strong> (${s.rol_aprobador_real}). Listo para aplicar en ERP.</div>
    <button class="btn btn-info btn-block" style="margin-top:12px;" onclick="confirmarAplicacion('${idSol}')">✓ Confirmar Aplicación en ERP</button>`;
  document.getElementById("aplicarDetail").innerHTML=detailPanel(s,extra);
}

async function confirmarAplicacion(idSol){
  const btn=document.querySelector("#aplicarDetail .btn-info");
  btn.disabled=true; btn.textContent="Aplicando...";
  const res=await api({accion:"APLICAR_DESCUENTO",user:CURRENT_USER,id_solicitud:idSol});
  if(!res.success){btn.disabled=false;btn.textContent="✓ Confirmar Aplicación en ERP";alert(res.error);return;}
  await loadData(); renderNav(); renderAplicar();
}

// ══════════════════════════════════════════════════════════════
// USUARIOS
// ══════════════════════════════════════════════════════════════
async function renderUsuarios(){
  const res=await api({accion:"GET_USUARIOS",user:CURRENT_USER});
  if(!res.success){document.getElementById("mainContent").innerHTML=`<div class="alertErr">${res.error}</div>`;return;}
  const users=res.data;
  const roleColors={ROL001:"var(--silver)",ROL002:"var(--approved)",ROL003:"var(--pending)",ROL004:"var(--purple)",ROL005:"var(--applied)",ROL006:"var(--red)",ROL007:"#6B7280"};
  document.getElementById("mainContent").innerHTML=`
  <div class="sectionTitle">Gestión de Usuarios</div>
  <div class="alertInfo" style="margin-bottom:14px;">ℹ️ Desactivar un usuario bloquea su acceso sin eliminar su historial.</div>
  ${users.map(u=>`
  <div class="card" style="margin-bottom:10px;opacity:${u.activo?1:0.6};">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:38px;height:38px;border-radius:50%;background:${roleColors[u.id_rol]||'var(--silver)'};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;">
        ${u.nombre_completo.split(" ").map(n=>n[0]).join("").slice(0,2)}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:13px;">${u.nombre_completo}</div>
        <div style="font-size:11px;color:${roleColors[u.id_rol]||'var(--silver)'};font-weight:600;">${u.nombre_rol}</div>
        ${u.id_sucursal?`<div style="font-size:11px;color:var(--silver);">${u.id_sucursal}</div>`:""}
        <div style="font-size:10px;color:var(--silver);">${u.id_usuario}</div>
      </div>
      <div style="text-align:center;flex-shrink:0;">
        <div style="font-size:10px;color:var(--silver);margin-bottom:4px;">${u.activo?"Activo":"Inactivo"}</div>
        <label class="toggle">
          <input type="checkbox" ${u.activo?"checked":""} onchange="toggleUser('${u.id_usuario}',this)"/>
          <span class="toggleSlider"></span>
        </label>
      </div>
    </div>
  </div>`).join("")}`;
}

async function toggleUser(idUsuario, el){
  el.disabled=true;
  const res=await api({accion:"TOGGLE_USUARIO",user:CURRENT_USER,id_usuario:idUsuario});
  if(!res.success){el.checked=!el.checked;alert(res.error);}
  el.disabled=false;
  await renderUsuarios();
}
</script>
